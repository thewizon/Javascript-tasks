<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            transition: background 0.4s ease;
            flex-direction: column;
        }


        #light {
            position: absolute;
            width: 600px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 230, 150, 0.6) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        body.on-bg #light {
            opacity: 1;
        }

        #bulb {
            width: 600px;
            height: auto;
            filter: brightness(0.9);
            transition: filter 0.3s ease;
            z-index: 2;
        }

        .on {
            filter: brightness(1.8);
        }

        .switch {
            margin-top: 40px;
            width: 80px;
            height: 40px;
            background: #444;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .switch::before {
            content: "";
            width: 35px;
            height: 35px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2.5px;
            left: 3px;
            transition: 0.3s;
        }

        .switch.on-switch {
            background: #ffcc00;
        }

        .switch.on-switch::before {
            transform: translateX(40px);
        }

        .label {
            color: white;
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div id="light"></div>
    <img id="bulb" src="off.png">
    <div class="switch" onclick="toggleBulb()"></div>
    <div class="label">Press B or Click</div>

    <script>
        function toggleBulb() {
            const bulb = document.getElementById("bulb");
            const switchBtn = document.querySelector(".switch");
            const body = document.body;

            bulb.classList.toggle("on");
            switchBtn.classList.toggle("on-switch");
            body.classList.toggle("on-bg");


            new Audio("sound.mp3").play();
        }

        document.addEventListener("keydown", function(e) {
            if (e.key === "b" || e.key === "B") toggleBulb();
        });
    </script>

</body>

</html>
